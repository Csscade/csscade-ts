name: Deploy Csscade to OVH (production)

on:
  push:
    branches:
      - production

permissions:
  contents: read

concurrency:
  group: "ovh-production"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
          standalone: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --store-dir=.pnpm-store

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Lint
        run: pnpm lint

      - name: Arch unit tests
        run: pnpm test:arch-unit

      - name: Component tests
        run: pnpm test:component

      - name: Build with Next.js
        run: pnpm build
        env:
          NODE_ENV: production
          # Root domain on OVH, unlike the GitHub Pages preprod which serves from a /csscade-ts/ sub-path.
          PAGES_BASE_PATH: ""
          PUBLIC_SITE_URL: "https://csscade.fr/"

      # TODO: finish this step once the OVH hosting plan and access method are decided.
      #
      # Option A — OVH VPS / server with SSH access (rsync over SSH):
      #   - name: Deploy over SSH
      #     uses: burnett01/rsync-deployments@7.0.1
      #     with:
      #       switches: -avzr --delete
      #       path: out/
      #       remote_path: ${{ secrets.OVH_REMOTE_PATH }}
      #       remote_host: ${{ secrets.OVH_SSH_HOST }}
      #       remote_user: ${{ secrets.OVH_SSH_USER }}
      #       remote_key: ${{ secrets.OVH_SSH_PRIVATE_KEY }}
      #
      # Option B — OVH mutualized hosting (SFTP only, no shell):
      #   - name: Deploy over SFTP
      #     uses: wlixcc/SFTP-Deploy-Action@v1.2.6
      #     with:
      #       server: ${{ secrets.OVH_SFTP_HOST }}
      #       username: ${{ secrets.OVH_SFTP_USER }}
      #       password: ${{ secrets.OVH_SFTP_PASSWORD }}
      #       local_path: out/*
      #       remote_path: ${{ secrets.OVH_REMOTE_PATH }}
      #
      # Whichever option is used, add the referenced secrets under
      # Settings -> Environments -> production (or repo-level Secrets), then uncomment.
      - name: Upload step not configured yet
        run: |
          echo "OVH hosting/access method not decided yet — see commented Option A/B above." >&2
          echo "This workflow builds and tests the production export but does not deploy it." >&2
          exit 1
