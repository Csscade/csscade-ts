name: QA on demand (accessibility, component & performance tests)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
          standalone: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --store-dir=.pnpm-store

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Start dev server
        run: pnpm dev &

      - name: Wait for dev server
        run: |
          for i in $(seq 1 30); do
            curl -sSf http://localhost:3000 > /dev/null && exit 0
            sleep 2
          done
          echo "Dev server did not start in time" >&2
          exit 1

      - name: Accessibility & Storybook component tests
        run: pnpm test:ui

      - name: Stop dev server
        if: always()
        run: kill $(lsof -t -i:3000) || true

      - name: Build for production
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Start production server
        run: pnpm start &

      - name: Wait for production server
        run: |
          for i in $(seq 1 30); do
            curl -sSf http://localhost:3000 > /dev/null && exit 0
            sleep 2
          done
          echo "Production server did not start in time" >&2
          exit 1

      - name: Lighthouse tests
        run: pnpm test:lighthouse

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
